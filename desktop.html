<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  font-size:18px;
  font-weight:bold;
  background:white;
  border-bottom:1px solid #ddd;
}

/* MENU */
.menu {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.menu button {
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#e6e6e6;
  cursor:pointer;
}

.menu button.active {
  background:#333;
  color:white;
}

/* IFRAME */
.viewer {
  width:100%;
  height:calc(100vh - 110px);
}

iframe {
  width:100%;
  height:100%;
  border:none;
}

/* LOADER */
.loader {
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #ccc;
  border-top:4px solid #333;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>

<script>
function trocar(link, botao) {
  document.getElementById("frame").src = link;

  document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  botao.classList.add("active");

  document.getElementById("loader").style.display = "flex";
}

function carregou() {
  document.getElementById("loader").style.display = "none";
}
</script>

</head>

<body>

<div class="header">
Painel de Gestão - Desktop
</div>

<div class="menu">
  <button class="active" onclick="trocar('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=3bb1545865c4f116e721', this)">Faturamento</button>

  <button onclick="trocar('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=ced204a27e77b5de109e', this)">Fluxo Caixa</button>

  <button onclick="trocar('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=a64d390e08d043599744', this)">Despesas</button>
</div>

<div class="viewer">

  <div id="loader" class="loader">
    <div class="spinner"></div>
  </div>

  <iframe id="frame"
    onload="carregou()"
    src="https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=3bb1545865c4f116e721">
  </iframe>

</div>

</body>
</html>
