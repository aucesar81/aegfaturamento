<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#e9ecef;
  display:flex;
  justify-content:center;
  transition:0.3s;
}

.auth-overlay {
  position:fixed;
  inset:0;
  background:rgba(15, 23, 42, 0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.auth-card {
  width:min(90vw, 360px);
  background:#fff;
  border-radius:12px;
  padding:16px;
  box-shadow:0 16px 30px rgba(0,0,0,0.18);
}

.auth-card h2 {
  margin:0 0 10px;
  font-size:18px;
}

.auth-card input {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:1px solid #ddd;
  border-radius:8px;
}

.auth-card button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:#fff;
  cursor:pointer;
}

.auth-error {
  color:#b91c1c;
  font-size:12px;
  min-height:16px;
  margin-bottom:8px;
}

/* APP */
.app {
  width:390px;
  height:100vh;
  background:white;
  display:flex;
  flex-direction:column;
  transition:0.3s;
}

/* MODO DESKTOP */
.app.desktop {
  width:100%;
}

/* HEADER */
.header {
  text-align:center;
  padding:12px;
  font-size:15px;
  font-weight:600;
  border-bottom:1px solid #eee;
}

/* MENU */
.menu {
  padding:10px;
  border-bottom:1px solid #eee;
}

.menu-title {
  font-size:11px;
  color:#888;
  margin-bottom:6px;
}

/* GRID */
.menu-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:6px;
}

/* BOTÕES */
.menu button {
  padding:10px 6px;
  border:none;
  border-radius:10px;
  background:#f1f3f5;
  font-size:11px;
}

.menu button.active {
  background:#333;
  color:white;
}

/* VIEWER */
.viewer {
  flex:1;
  position:relative;
}

iframe {
  transform: scale(0.90);
  transform-origin: top left;

  width: 111%;
  height: 111%;

  border:none;
}

/* LOADER */
.loader {
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.spinner {
  width:30px;
  height:30px;
  border:3px solid #ccc;
  border-top:3px solid #333;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}
</style>

<script>
function trocarPagina(link, botao) {
  document.getElementById("frame").src = link;

  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  botao.classList.add("active");

  document.getElementById("loader").style.display = "flex";
}

function carregou() {
  document.getElementById("loader").style.display = "none";
}

/* MODO DESKTOP */
function ativarDesktop(link, botao) {
  document.getElementById("app").classList.add("desktop");

  trocarPagina(link, botao);
}

/* VOLTAR MOBILE */
function voltarMobile() {
  document.getElementById("app").classList.remove("desktop");
}

const STATIC_USER = "abd";
const STATIC_PASS_HASH = "8d969eef6ecad3c29a3a629280e686cff8fabd82f4f5d4fcbf6f2f8f8d6f7f57";

async function sha256(text) {
  const bytes = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function validarLogin() {
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  const error = document.getElementById("authError");
  const passHash = await sha256(pass);

  if (user === STATIC_USER && passHash === STATIC_PASS_HASH) {
    localStorage.setItem("abd_auth", "ok");
    document.getElementById("authOverlay").style.display = "none";
    return;
  }

  error.textContent = "Usuário ou senha inválidos.";
}

function sair() {
  localStorage.removeItem("abd_auth");
  document.getElementById("authOverlay").style.display = "flex";
}

window.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("abd_auth") === "ok") {
    document.getElementById("authOverlay").style.display = "none";
  }
});
</script>

</head>

<body>

<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <h2>Acesso ao Painel</h2>
    <input id="loginUser" type="text" placeholder="Usuário" />
    <input id="loginPass" type="password" placeholder="Senha" />
    <div id="authError" class="auth-error"></div>
    <button onclick="validarLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="app">

  <div class="header">
    Painel de Gestão - ABD Informática
  </div>

  <div class="menu">

    <div class="menu-title">📱 MOBILE</div>
    <div class="menu-grid">
      <button onclick="trocarPagina('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=83da6b63fe43f2219715&pageView=fitToWidth', this)" class="active">📊<br>Faturamento</button>

      <button onclick="trocarPagina('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=264146c7322b7aefdb19&pageView=fitToWidth', this)">💰<br>Fluxo</button>

      <button onclick="trocarPagina('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=c8682f32a11d4a6ffc3c&pageView=fitToWidth', this)">📉<br>Despesas</button>
    </div>

    <div class="menu-title" style="margin-top:10px;">💻 DESKTOP</div>
    <div class="menu-grid">
      <button onclick="ativarDesktop('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=3bb1545865c4f116e721&pageView=fitToWidth', this)">🖥<br>Faturamento</button>

      <button onclick="ativarDesktop('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=ced204a27e77b5de109e&pageView=fitToWidth', this)">🖥<br>Fluxo</button>

      <button onclick="ativarDesktop('https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=a64d390e08d043599744&pageView=fitToWidth', this)">🖥<br>Despesas</button>
    </div>

    <!-- BOTÃO VOLTAR -->
    <div style="text-align:center;margin-top:10px;">
      <button onclick="voltarMobile()" style="font-size:10px;background:#eee;border-radius:8px;padding:6px 10px;">
        Voltar Mobile
      </button>
      <button onclick="sair()" style="font-size:10px;background:#eee;border-radius:8px;padding:6px 10px;">
        Sair
      </button>
    </div>

  </div>

  <div class="viewer">

    <div id="loader" class="loader">
      <div class="spinner"></div>
    </div>

    <iframe id="frame"
      onload="carregou()"
      src="https://app.powerbi.com/view?r=eyJrIjoiZTg0YmQwMzYtYjY4NS00YmM3LWJhNGUtZTNmODU0NThiYTgyIiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9&pageName=83da6b63fe43f2219715">
    </iframe>

  </div>

</div>

</body>
</html>
