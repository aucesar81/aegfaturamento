<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Gestão - ABD Informática</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #e9ecef;
  display: flex;
  justify-content: center;
}

.auth-overlay {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.auth-card {
  width: min(90vw, 360px);
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 16px 30px rgba(0, 0, 0, 0.18);
}

.auth-card h2 { margin: 0 0 10px; font-size: 20px; }
.auth-card input {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-sizing: border-box;
}
.auth-card button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #111827;
  color: #fff;
  cursor: pointer;
}
.auth-error { color: #b91c1c; font-size: 12px; min-height: 16px; margin-bottom: 8px; }

.app {
  width: 390px;
  height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
}
.app.desktop { width: 100%; }

.header {
  text-align: center;
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  border-bottom: 1px solid #eee;
}

.menu { padding: 10px; border-bottom: 1px solid #eee; }
.menu-title { font-size: 11px; color: #888; margin-bottom: 6px; }
.menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }

.menu button {
  padding: 10px 6px;
  border: none;
  border-radius: 10px;
  background: #f1f3f5;
  font-size: 12px;
  cursor: pointer;
}
.menu button.active { background: #333; color: white; }

.viewer { flex: 1; position: relative; }
iframe {
  transform: scale(0.90);
  transform-origin: top left;
  width: 111%;
  height: 111%;
  border: none;
}

.loader {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
.spinner {
  width: 30px;
  height: 30px;
  border: 3px solid #ccc;
  border-top: 3px solid #333;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
const REPORT_URL = "https://app.powerbi.com/reportEmbed?reportId=dad6812e-a028-49fb-8987-3389c870c452&autoAuth=true&ctid=fb038608-50e7-4da3-85c5-5ddd4c824fac";
const STATIC_USER = "abd";
const STATIC_PASS_HASH = "8d969eef6ecad3c29a3a629280e686cff8fabd82f4f5d4fcbf6f2f8f8d6f7f57";

function trocarPagina(link, botao) {
  document.getElementById("frame").src = link;
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  botao.classList.add("active");
  document.getElementById("loader").style.display = "flex";
}

function carregou() {
  document.getElementById("loader").style.display = "none";
}

function ativarDesktop(link, botao) {
  document.getElementById("app").classList.add("desktop");
  trocarPagina(link, botao);
}

function voltarMobile() {
  document.getElementById("app").classList.remove("desktop");
}

async function sha256(text) {
  const bytes = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function validarLogin() {
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  const error = document.getElementById("authError");
  const passHash = await sha256(pass);

  if (user === STATIC_USER && passHash === STATIC_PASS_HASH) {
    localStorage.setItem("abd_auth", "ok");
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("app").style.visibility = "visible";
    return;
  }

  error.textContent = "Usuário ou senha inválidos.";
}

function sair() {
  localStorage.removeItem("abd_auth");
  document.getElementById("authOverlay").style.display = "flex";
  document.getElementById("app").style.visibility = "hidden";
}

window.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("abd_auth") === "ok") {
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("app").style.visibility = "visible";
    return;
  }
  document.getElementById("app").style.visibility = "hidden";
});
</script>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <h2>Acesso ao Painel</h2>
    <input id="loginUser" type="text" placeholder="Usuário">
    <input id="loginPass" type="password" placeholder="Senha">
    <div id="authError" class="auth-error"></div>
    <button onclick="validarLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="app" style="visibility:hidden;">
  <div class="header">Painel de Gestão - ABD Informática</div>

  <div class="menu">
    <div class="menu-title">MOBILE</div>
    <div class="menu-grid">
      <button onclick="trocarPagina(REPORT_URL, this)" class="active">Faturamento</button>
      <button onclick="trocarPagina(REPORT_URL, this)">Compras</button>
    </div>

    <div class="menu-title" style="margin-top:10px;">DESKTOP</div>
    <div class="menu-grid">
      <button onclick="ativarDesktop(REPORT_URL, this)">Faturamento</button>
      <button onclick="ativarDesktop(REPORT_URL, this)">Compras</button>
    </div>

    <div style="text-align:center;margin-top:10px;display:flex;gap:8px;justify-content:center;">
      <button onclick="voltarMobile()" style="font-size:10px;background:#eee;border-radius:8px;padding:6px 10px;">Voltar Mobile</button>
      <button onclick="sair()" style="font-size:10px;background:#eee;border-radius:8px;padding:6px 10px;">Sair</button>
    </div>
  </div>

  <div class="viewer">
    <div id="loader" class="loader"><div class="spinner"></div></div>
    <iframe id="frame" onload="carregou()" src="https://app.powerbi.com/reportEmbed?reportId=dad6812e-a028-49fb-8987-3389c870c452&autoAuth=true&ctid=fb038608-50e7-4da3-85c5-5ddd4c824fac"></iframe>
  </div>
</div>

</body>
</html>
