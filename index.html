<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Gestão - ABD Informática</title>
<style>
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:#e9ecef; }
.auth-overlay { position:fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; z-index:1000; }
.auth-card { width:min(90vw,420px); background:#fff; border-radius:12px; padding:16px; box-shadow:0 16px 30px rgba(0,0,0,.18); }
.auth-card h2 { margin:0 0 10px; font-size:20px; }
.auth-card input { width:100%; padding:10px; margin-bottom:8px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; }
.auth-card button { width:100%; padding:10px; border:none; border-radius:8px; background:#111827; color:#fff; cursor:pointer; }
.auth-error { color:#b91c1c; font-size:12px; min-height:16px; margin-bottom:8px; }

.app { width:100%; min-height:100vh; background:#fff; display:flex; flex-direction:column; }
.header { text-align:center; padding:14px; font-size:18px; font-weight:700; border-bottom:1px solid #eee; }
.menu { padding:12px; border-bottom:1px solid #eee; display:flex; gap:8px; justify-content:center; }
.menu button { padding:10px 14px; border:none; border-radius:10px; background:#f1f3f5; font-size:13px; cursor:pointer; }
.menu button.active { background:#333; color:#fff; }
.viewer { flex:1; position:relative; min-height:calc(100vh - 120px); }
iframe { width:100%; height:100%; min-height:calc(100vh - 120px); border:none; }
.loader { position:absolute; width:100%; height:100%; background:#fff; display:flex; justify-content:center; align-items:center; z-index:10; }
.spinner { width:34px; height:34px; border:4px solid #ccc; border-top:4px solid #333; border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { 100% { transform:rotate(360deg); } }
</style>
<script>
const REPORT_URL = "https://app.powerbi.com/view?r=eyJrIjoiYmYxZmQ3ZTEtNmJjZi00ZTg4LTk4YjItMjBhODM2NDA0ODQ0IiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9";
const STATIC_USER = "abd";
const STATIC_PASS_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92";

function trocarPagina(link, botao) {
  document.getElementById("frame").src = link;
  document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));
  botao.classList.add("active");
  document.getElementById("loader").style.display = "flex";
}
function carregou() { document.getElementById("loader").style.display = "none"; }

async function sha256(text) {
  const bytes = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, "0")).join("");
}

async function validarLogin() {
  const user = document.getElementById("loginUser").value.trim();
  const pass = document.getElementById("loginPass").value;
  const error = document.getElementById("authError");
  const passHash = await sha256(pass);
  if (user === STATIC_USER && passHash === STATIC_PASS_HASH) {
    localStorage.setItem("abd_auth", "ok");
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("app").style.visibility = "visible";
    return;
  }
  error.textContent = "Usuário ou senha inválidos.";
}

function sair() {
  localStorage.removeItem("abd_auth");
  document.getElementById("authOverlay").style.display = "flex";
  document.getElementById("app").style.visibility = "hidden";
}

window.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("abd_auth") === "ok") {
    document.getElementById("authOverlay").style.display = "none";
    document.getElementById("app").style.visibility = "visible";
    return;
  }
  document.getElementById("app").style.visibility = "hidden";
});
</script>
</head>
<body>
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <h2>Acesso ao Painel PowerBI - A&G Plásticos</h2>
    <input id="loginUser" type="text" placeholder="Usuário">
    <input id="loginPass" type="password" placeholder="Senha">
    <div id="authError" class="auth-error"></div>
    <button onclick="validarLogin()">Entrar</button>
  </div>
</div>

<div id="app" class="app" style="visibility:hidden;">
  <div class="header">Painel de Gestão - A&G Plásticos</div>
  <div class="menu">
    <button onclick="trocarPagina(REPORT_URL, this)" class="active">Faturamento</button>
    <button onclick="trocarPagina(REPORT_URL, this)">Compras</button>
    <button onclick="sair()">Sair</button>
  </div>
  <div class="viewer">
    <div id="loader" class="loader"><div class="spinner"></div></div>
    <iframe id="frame" onload="carregou()" src="https://app.powerbi.com/view?r=eyJrIjoiYmYxZmQ3ZTEtNmJjZi00ZTg4LTk4YjItMjBhODM2NDA0ODQ0IiwidCI6ImZiMDM4NjA4LTUwZTctNGRhMy04NWM1LTVkZGQ0YzgyNGZhYyJ9" allowfullscreen="true"></iframe>
  </div>
</div>
</body>
</html>
